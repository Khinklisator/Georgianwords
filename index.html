<script>
const REPO = 'Khinklisator/Georgianwords';
const FILE = 'words.json';
const API  = `https://api.github.com/repos/${REPO}/contents/${FILE}`;

let words = [];
let fileSha = null;
let sortCol = 'ka';
let sortDir = 1;
let cardOrder = [];
let cardIdx = 0;
let isFlipped = false;
let isSaving = false;

function previewToken() {
  const raw = document.getElementById('token-input').value;
  const t = raw.trim();
  const preview = document.getElementById('token-preview');

  if (t.length > 0) {
    preview.textContent = `Будет отправлено (${t.length} символов): ${t.slice(0, 6)}...${t.slice(-4)}`;
  } else {
    preview.textContent = '';
  }
}

function cleanToken() {
  return document.getElementById('token-input').value.trim();
}

function getToken() {
  return localStorage.getItem('gh_token');
}

function ghHeaders(token = getToken()) {
  return {
    Authorization: `Bearer ${token}`,
    Accept: 'application/vnd.github+json'
  };
}

function setSync(state, text) {
  document.getElementById('sync-dot').className = 'sync-dot ' + state;
  document.getElementById('sync-text').textContent = text;
}

function showSetup() {
  document.getElementById('setup-screen').style.display = 'block';
  document.getElementById('app').style.display = 'none';
}

function showApp() {
  document.getElementById('setup-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

function showSetupError(message) {
  const err = document.getElementById('setup-error');
  err.textContent = message;
  err.style.display = 'block';
}

function hideSetupError() {
  const err = document.getElementById('setup-error');
  err.style.display = 'none';
}

async function parseGitHubError(res) {
  let text = '';
  try {
    text = await res.text();
  } catch {
    return `HTTP ${res.status}`;
  }

  if (!text) return `HTTP ${res.status}`;

  try {
    const data = JSON.parse(text);
    return data.message || `HTTP ${res.status}`;
  } catch {
    return text;
  }
}

async function init() {
  if (!getToken()) {
    showSetup();
    return;
  }

  showApp();
  const ok = await loadWords();

  if (!ok) {
    showSetup();
    showSetupError('Токен сохранён, но доступ к репозиторию не прошёл. Проверь права токена.');
  }
}

async function saveToken() {
  const t = cleanToken();
  if (!t) return;

  hideSetupError();
  setSync('loading', 'Проверка...');

  try {
    // 1) Проверяем, что токен вообще валиден
    const userRes = await fetch('https://api.github.com/user', {
      headers: ghHeaders(t)
    });

    if (!userRes.ok) {
      const msg = await parseGitHubError(userRes);
      showSetupError(`Ошибка токена: ${msg}`);
      setSync('err', 'Ошибка');
      return;
    }

    // 2) Проверяем доступ к файлу репозитория этим токеном
    const repoRes = await fetch(API, {
      headers: ghHeaders(t)
    });

    if (!repoRes.ok) {
      const msg = await parseGitHubError(repoRes);
      showSetupError(`Нет доступа к ${REPO}: ${msg}`);
      setSync('err', 'Ошибка');
      return;
    }

    localStorage.setItem('gh_token', t);
    showApp();

    const ok = await loadWords();
    if (!ok) {
      showSetup();
      showSetupError('Не удалось загрузить words.json после авторизации.');
    }
  } catch (e) {
    console.error(e);
    showSetupError('Нет связи с GitHub API.');
    setSync('err', 'Нет связи');
  }
}

async function loadWords() {
  setSync('loading', 'Загрузка...');

  try {
    const res = await fetch(API, {
      headers: ghHeaders()
    });

    if (!res.ok) {
      const msg = await parseGitHubError(res);
      console.error('GitHub load error:', msg);
      setSync('err', 'Ошибка');
      return false;
    }

    const data = await res.json();
    fileSha = data.sha;

    const content = (data.content || '').replace(/\n/g, '');
    const binary = atob(content);
    const bytes = Uint8Array.from(binary, c => c.charCodeAt(0));
    const decoded = new TextDecoder('utf-8').decode(bytes);

    words = JSON.parse(decoded);
    setSync('ok', 'Синхронизировано');
    renderList();
    return true;
  } catch (e) {
    console.error('loadWords error:', e);
    setSync('err', 'Нет связи');
    return false;
  }
}

async function saveWords() {
  isSaving = true;
  document.getElementById('saving-text').style.display = 'inline';
  document.getElementById('add-btn').disabled = true;
  setSync('loading', 'Сохранение...');

  try {
    const content = btoa(
      unescape(
        encodeURIComponent(JSON.stringify(words, null, 2))
      )
    );

    const res = await fetch(API, {
      method: 'PUT',
      headers: {
        ...ghHeaders(),
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        message: 'update words',
        content,
        sha: fileSha
      })
    });

    const data = await res.json().catch(() => ({}));

    if (!res.ok) {
      console.error('GitHub save error:', data);
      setSync('err', data.message || 'Ошибка сохранения');
      return false;
    }

    fileSha = data.content?.sha || fileSha;
    setSync('ok', 'Синхронизировано');
    return true;
  } catch (e) {
    console.error('saveWords error:', e);
    setSync('err', 'Нет связи');
    return false;
  } finally {
    isSaving = false;
    document.getElementById('saving-text').style.display = 'none';
    document.getElementById('add-btn').disabled = false;
  }
}

function showView(v, el) {
  document.querySelectorAll('.view').forEach(x => x.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  el.classList.add('active');

  if (v === 'cards') {
    loadWords().then(ok => {
      if (ok) initCards();
    });
  }

  if (v === 'dict') {
    loadWords();
  }
}

function toggleAddForm() {
  const f = document.getElementById('add-form');
  f.classList.toggle('open');
  if (f.classList.contains('open')) {
    document.getElementById('inp-ka').focus();
  }
}

function formKeydown(e) {
  if (e.key === 'Enter') addWord();
  if (e.key === 'Escape') toggleAddForm();
}

async function addWord() {
  if (isSaving) return;

  const ka = document.getElementById('inp-ka').value.trim();
  const tr = document.getElementById('inp-tr').value.trim();
  const ru = document.getElementById('inp-ru').value.trim();

  if (!ka || !ru) {
    document.getElementById(!ka ? 'inp-ka' : 'inp-ru').focus();
    return;
  }

  words.push({
    id: Date.now(),
    ka,
    tr,
    ru
  });

  document.getElementById('inp-ka').value = '';
  document.getElementById('inp-tr').value = '';
  document.getElementById('inp-ru').value = '';
  document.getElementById('inp-ka').focus();

  renderList();
  await saveWords();
}

async function deleteWord(id) {
  if (isSaving) return;
  words = words.filter(w => w.id !== id);
  renderList();
  await saveWords();
}

function sortBy(col) {
  if (sortCol === col) {
    sortDir *= -1;
  } else {
    sortCol = col;
    sortDir = 1;
  }
  renderList();
}

function renderList() {
  const q = document.getElementById('search-input').value.toLowerCase();

  let list = words.filter(w =>
    (w.ka || '').toLowerCase().includes(q) ||
    (w.ru || '').toLowerCase().includes(q) ||
    (w.tr || '').toLowerCase().includes(q)
  );

  list.sort((a, b) =>
    (a[sortCol] || '').localeCompare((b[sortCol] || ''), 'ru') * sortDir
  );

  ['ka', 'ru'].forEach(c => {
    const el = document.getElementById('sort-' + c);
    if (el) {
      el.textContent = sortCol === c ? (sortDir === 1 ? ' ↑' : ' ↓') : '';
    }
  });

  document.getElementById('word-count').textContent = words.length;
  const body = document.getElementById('word-list-body');

  if (!list.length) {
    body.innerHTML = `<div class="empty-state"><div class="empty-icon">ა</div><p>${q ? 'Ничего не найдено' : 'Словарь пуст'}</p></div>`;
    return;
  }

  body.innerHTML = list.map(w => `
    <div class="word-item" id="row-${w.id}">
      <div class="word-ka">${esc(w.ka)}</div>
      <div class="word-tr">${esc(w.tr || '')}</div>
      <div class="word-ru">${esc(w.ru)}</div>
      <button class="del-btn" onclick="event.stopPropagation();deleteWord(${w.id})">
        <svg width="13" height="13" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 2l9 9M11 2L2 11"/></svg>
      </button>
    </div>
  `).join('');

  list.forEach(w => {
    document.getElementById('row-' + w.id).addEventListener('click', () => startEdit(w.id));
  });
}

function startEdit(id) {
  if (isSaving) return;

  const w = words.find(x => x.id === id);
  if (!w) return;

  const row = document.getElementById('row-' + id);
  if (!row || row.classList.contains('editing')) return;

  row.classList.add('editing');
  row.innerHTML = `
    <input class="edit-inp" id="eka-${id}" value="${esc(w.ka)}" placeholder="ვაშლი" onkeydown="editKey(event,${id})">
    <input class="edit-inp" id="etr-${id}" value="${esc(w.tr || '')}" placeholder="vashli" onkeydown="editKey(event,${id})">
    <input class="edit-inp" id="eru-${id}" value="${esc(w.ru)}" placeholder="яблоко" onkeydown="editKey(event,${id})">
    <div class="edit-btns">
      <button class="edit-cancel" onclick="renderList()">✕</button>
      <button class="edit-save" onclick="saveEdit(${id})">✓</button>
    </div>
  `;

  document.getElementById('eka-' + id).focus();
}

function editKey(e, id) {
  e.stopPropagation();
  if (e.key === 'Enter') saveEdit(id);
  if (e.key === 'Escape') renderList();
}

async function saveEdit(id) {
  if (isSaving) return;

  const ka = document.getElementById('eka-' + id).value.trim();
  const tr = document.getElementById('etr-' + id).value.trim();
  const ru = document.getElementById('eru-' + id).value.trim();

  if (!ka || !ru) return;

  const w = words.find(x => x.id === id);
  if (w) {
    w.ka = ka;
    w.tr = tr;
    w.ru = ru;
  }

  renderList();
  await saveWords();
}

function esc(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function initCards() {
  cardOrder = words.map((_, i) => i);
  cardIdx = 0;
  isFlipped = false;
  document.getElementById('card-inner').classList.remove('flipped');
  renderCard();
}

function shuffleCards() {
  for (let i = cardOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cardOrder[i], cardOrder[j]] = [cardOrder[j], cardOrder[i]];
  }

  cardIdx = 0;
  isFlipped = false;
  document.getElementById('card-inner').classList.remove('flipped');
  renderCard();
}

function resetCards() {
  cardOrder = words.map((_, i) => i);
  cardIdx = 0;
  isFlipped = false;
  document.getElementById('card-inner').classList.remove('flipped');
  renderCard();
}

function renderCard() {
  const n = cardOrder.length;

  document.getElementById('fc-empty-state').style.display = n === 0 ? 'block' : 'none';
  document.getElementById('fc-main').style.display = n === 0 ? 'none' : 'block';

  if (!n) return;

  const w = words[cardOrder[cardIdx]];
  document.getElementById('card-ka').textContent = w.ka;
  document.getElementById('card-tr-front').textContent = w.tr || '';
  document.getElementById('card-ka-back').textContent = w.ka;
  document.getElementById('card-tr-back').textContent = w.tr || '';
  document.getElementById('card-ru').textContent = w.ru;
  document.getElementById('fc-idx').textContent = cardIdx + 1;
  document.getElementById('fc-total').textContent = n;
  document.getElementById('btn-prev').disabled = cardIdx === 0;
  document.getElementById('btn-next').disabled = cardIdx === n - 1;
}

function flipCard() {
  isFlipped = !isFlipped;
  document.getElementById('card-inner').classList.toggle('flipped', isFlipped);
}

function nextCard() {
  if (cardIdx < cardOrder.length - 1) {
    cardIdx++;
    isFlipped = false;
    document.getElementById('card-inner').classList.remove('flipped');
    renderCard();
  }
}

function prevCard() {
  if (cardIdx > 0) {
    cardIdx--;
    isFlipped = false;
    document.getElementById('card-inner').classList.remove('flipped');
    renderCard();
  }
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('view-cards').classList.contains('active')) return;

  if (e.key === 'ArrowRight') nextCard();
  if (e.key === 'ArrowLeft') prevCard();
  if (e.key === ' ') {
    e.preventDefault();
    flipCard();
  }
});

init();
</script>
